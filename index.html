<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helix Live Control</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #161a23;
            --surface2: #1e2433;
            --border: #2a3147;
            --accent: #e8491e;
            --accent2: #f97316;
            --blue: #3b82f6;
            --green: #22c55e;
            --yellow: #eab308;
            --text: #e2e8f0;
            --muted: #64748b;
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 24px 16px 40px;
            gap: 20px;
        }

        header {
            width: 100%;
            max-width: 720px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-icon {
            width: 38px;
            height: 38px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -0.5px;
        }

        .logo h1 span {
            color: var(--accent2);
        }

        #status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 999px;
            font-size: 12px;
            font-weight: 600;
            transition: border-color 0.3s;
        }

        #status-badge.connected {
            border-color: var(--green);
            color: var(--green);
        }

        #status-badge.disconnected {
            border-color: var(--muted);
            color: var(--muted);
        }

        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: currentColor;
            animation: pulse 2s infinite;
        }

        #status-badge.disconnected .dot {
            animation: none;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1
            }

            50% {
                opacity: 0.3
            }
        }

        .state-panel {
            width: 100%;
            max-width: 720px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px;
            display: flex;
            flex-wrap: wrap;
            align-items: stretch;
            gap: 14px;
        }

        .state-card {
            position: relative;
        }

        .edit-trigger {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--muted);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 10;
        }

        .edit-trigger:hover {
            background: var(--surface2);
            color: var(--accent2);
            border-color: var(--accent2);
        }

        .ctrl-btn .edit-trigger {
            top: 4px;
            right: 4px;
            width: 22px;
            height: 22px;
            font-size: 10px;
            opacity: 0.3;
        }

        .ctrl-btn:hover .edit-trigger {
            opacity: 1;
        }

        .state-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            flex-direction: column;
            gap: 4px;
            transition: border-color 0.3s, box-shadow 0.3s;
        }

        .state-card.flash {
            border-color: var(--accent2);
            box-shadow: 0 0 16px rgba(249, 115, 22, 0.2);
        }

        .state-card label {
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .state-card .value {
            font-size: 18px;
            font-weight: 900;
            line-height: 1.1;
            letter-spacing: -0.5px;
            word-break: break-all;
        }

        .state-card .sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 18px;
            color: var(--muted);
            font-weight: 700;
            min-height: 16px;
        }

        .expr-bar-wrap {
            margin-top: 4px;
            background: var(--border);
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .expr-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--blue), var(--accent2));
            border-radius: 4px;
            transition: width 0.1s ease;
        }

        .section-title {
            width: 100%;
            max-width: 720px;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--muted);
        }

        .grid {
            width: 100%;
            max-width: 720px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
        }

        .ctrl-btn {
            padding: 18px 12px;
            border: 1px solid;
            border-radius: 10px;
            cursor: pointer;
            font-family: 'Inter', sans-serif;
            font-weight: 700;
            font-size: 13px;
            transition: transform 0.1s, opacity 0.15s;
            position: relative;
            overflow: hidden;
        }

        .ctrl-btn:active {
            transform: scale(0.95);
            opacity: 0.8;
        }

        .ctrl-btn.active {
            border-color: #ffffff !important;
            background-color: #ffffff !important;
            color: var(--bg) !important;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .nav-col {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 80px;
        }

        .nav-btn {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 24px;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }

        .nav-btn:active {
            background: var(--border);
        }

        #log {
            width: 100%;
            max-width: 720px;
            height: 400px;
            overflow-y: scroll;
            background: #070910;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: 'JetBrains Mono', monospace;
            font-size: 11px;
            padding: 10px 14px;
            color: #94a3b8;
        }

        .log-entry {
            padding: 1px 0;
        }

        .log-entry.rx {
            color: #67e8f9;
        }

        .log-entry.tx {
            color: #86efac;
        }

        .log-entry .ts {
            color: var(--muted);
            margin-right: 6px;
        }
    </style>
</head>

<body>

    <header>
        <div class="logo">
            <h1>Helix <span>Live</span></h1>
        </div>

        <div id="status-badge" class="disconnected">
            <span class="dot"></span>
            <span id="status-text">Buscando Helix...</span>
        </div>
    </header>

    <div class="state-panel">
        <div class="state-card" id="card-setlist" style="flex: 1;">
            <div class="edit-trigger" onclick="editSetlistName()"><i class="fa-solid fa-pen-to-square"></i></div>
            <label>Setlist</label>
            <div class="value" id="setlist-name" style="font-size: 14px; color: var(--accent2);">FACTORY 1</div>
            <div class="sub" id="setlist-id" style="font-size: 11px;">#1</div>
            <div style="display: flex; gap: 5px; margin-top: 5px;">
                <button class="nav-btn" style="padding: 2px 8px; font-size: 10px;"
                    onclick="event.stopPropagation(); sendSetlistStep(-1)">▲</button>
                <button class="nav-btn" style="padding: 2px 8px; font-size: 10px;"
                    onclick="event.stopPropagation(); sendSetlistStep(1)">▼</button>
            </div>
        </div>

        <div class="state-card" id="card-preset" style="flex: 2;">
            <div class="edit-trigger" onclick="editPresetName()"><i class="fa-solid fa-pen-to-square"></i></div>
            <label>Preset Activo</label>
            <div class="value" id="preset-name">Sin Nombre</div>
            <div class="sub" id="preset-id">&#8212;</div>
        </div>

        <!-- Botones subir/bajar preset -->
        <div class="nav-col">
            <button class="nav-btn" onclick="sendPresetStep(1)">▲</button>
            <button class="nav-btn" onclick="sendPresetStep(-1)">▼</button>
        </div>

        <!-- Tuner como botón estilo tarjeta -->
        <button class="state-card" id="btn-tuner" onclick="sendMIDI(68, 127)"
            style="cursor:pointer; text-align:left; align-items:flex-start; flex: 1;">
            <label>Utilidad</label>
            <div class="value" style="color:var(--yellow)">TUNER</div>
            <div class="sub" style="color:var(--muted)">Afinador</div>
        </button>
    </div>

    <div class="grid" id="button-container"></div>

    <div style="width:100%; max-width:720px; display:flex; justify-content:space-between; align-items:center;">
        <p class="section-title">Consola MIDI</p>
    </div>

    <div id="log"></div>

    <script>
        let midiOutput = null;
        let midiInput = null;

        // Diccionarios y Config Global Jerárquica
        let cloudConfig = {
            setlists: {
                0: { name: "FACTORY 1", presets: {} },
                1: { name: "FACTORY 2", presets: {} },
                2: { name: "USER 1", presets: {} },
                3: { name: "USER 2", presets: {} },
                4: { name: "USER 3", presets: {} },
                5: { name: "USER 4", presets: {} },
                6: { name: "USER 5", presets: {} },
                7: { name: "TEMPLATES", presets: {} }
            },
            customActions: []
        };

        let vpsUrl = "https://helix.bisaro.ar/helix_api.php?v=1";

        let currentSetlist = 2; // Iniciar en USER 1 (index 2)
        let currentPresetIdx = 0;
        let currentSnapshot = 0;

        const config = [
            // Fila superior: 5-8
            { name: "SNAP 5", cc: 69, value: 4, color: "#ffffff" },
            { name: "SNAP 6", cc: 69, value: 5, color: "#ffffff" },
            { name: "SNAP 7", cc: 69, value: 6, color: "#ffffff" },
            { name: "SNAP 8", cc: 69, value: 7, color: "#ffffff" },
            // Fila inferior: 1-4
            { name: "SNAP 1", cc: 69, value: 0, color: "#ffffff" },
            { name: "SNAP 2", cc: 69, value: 1, color: "#ffffff" },
            { name: "SNAP 3", cc: 69, value: 2, color: "#ffffff" },
            { name: "SNAP 4", cc: 69, value: 3, color: "#ffffff" },
        ];

        // Helpers para navegación jerárquica
        function getSetlist(sid) {
            if (!cloudConfig.setlists) cloudConfig.setlists = {};
            if (!cloudConfig.setlists[sid] || typeof cloudConfig.setlists[sid] !== 'object') {
                cloudConfig.setlists[sid] = { name: `SETLIST ${sid + 1}`, presets: {} };
            }
            return cloudConfig.setlists[sid];
        }

        function getPreset(sid, pid) {
            const sl = getSetlist(sid);
            if (!sl.presets) sl.presets = {};
            if (!sl.presets[pid] || typeof sl.presets[pid] !== 'object') {
                sl.presets[pid] = { name: "Sin Nombre", snapshots: {} };
            }
            return sl.presets[pid];
        }

        // ── Cloud Persistence ────────────────────────────────
        async function loadNames() {
            const savedData = localStorage.getItem('helix_cloud_config');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    // Validación de migración: comprobamos si el primer elemento es un objeto (nuevo formato)
                    if (parsed.setlists && typeof parsed.setlists[0] === 'object') {
                        cloudConfig = parsed;
                    } else {
                        logEntry("sys", "Detectado formato antiguo. Reseteando estructura...");
                    }
                } catch (e) {
                    console.error("Error al parsear config local", e);
                }
            }

            // Sincronizar automáticamente con la nube al inicio
            logEntry("sys", "Sincronizando con la nube...");
            await syncWithCloud(true);
        }

        async function syncWithCloud(isSilent = false) {
            if (!vpsUrl) return;

            try {
                const response = await fetch(vpsUrl);
                const data = await response.json();

                if (data.setlists) cloudConfig.setlists = data.setlists;
                if (data.customActions) cloudConfig.customActions = data.customActions;

                localStorage.setItem('helix_cloud_config', JSON.stringify(cloudConfig));
                localStorage.setItem('helix_vps_url', vpsUrl);

                renderButtons();
                updatePresetDisplay(currentPresetIdx);
                updateSetlistDisplay(currentSetlist);
                if (!isSilent) alert("Nube sincronizada con éxito.");
                logEntry("sys", "Sincronización Cloud exitosa.");
            } catch (e) {
                console.error(e);
                if (!isSilent) alert("Error al conectar con el VPS.");
            }
        }

        async function saveCloudData() {
            localStorage.setItem('helix_cloud_config', JSON.stringify(cloudConfig));

            try {
                await fetch(vpsUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(cloudConfig)
                });
                logEntry("sys", "Nube actualizada correctamente.");
            } catch (e) {
                logEntry("sys", "Error al sincronizar con la nube.");
            }
        }

        async function editPresetName() {
            const preset = getPreset(currentSetlist, currentPresetIdx);
            const newName = prompt(`Nombre para el Preset ${formatHelixPreset(currentPresetIdx)}:`, preset.name);
            if (newName !== null) {
                preset.name = newName.trim();
                updatePresetDisplay(currentPresetIdx);
                await saveCloudData();
            }
        }

        async function editSnapshotName(snapId) {
            const preset = getPreset(currentSetlist, currentPresetIdx);
            const currentName = preset.snapshots[snapId] || `SNAP ${snapId}`;
            const newName = prompt(`Nombre para el Snapshot ${snapId}:`, currentName);
            if (newName !== null) {
                preset.snapshots[snapId] = newName.trim();
                renderButtons();
                await saveCloudData();
            }
        }

        async function editSetlistName() {
            const setlist = getSetlist(currentSetlist);
            const newName = prompt(`Nombre para el Setlist #${currentSetlist + 1}:`, setlist.name);
            if (newName !== null) {
                setlist.name = newName.trim();
                updateSetlistDisplay(currentSetlist);
                await saveCloudData();
            }
        }

        function sendSetlistStep(step) {
            let next = currentSetlist + step;
            if (next < 0) next = 7;
            if (next > 7) next = 0;
            changeSetlist(next);
        }

        async function changeSetlist(id) {
            const setlistId = parseInt(id);
            logEntry("sys", "Intentando cambio a Setlist " + (setlistId + 1) + "...");

            // Actualizamos estado local
            currentSetlist = setlistId;
            updateSetlistDisplay(setlistId);

            // Según HelixHelp, el comando correcto es CC 32
            sendMIDI(32, setlistId);

            // Un pequeño retraso para que la Helix procese el cambio de banco antes del PC
            setTimeout(() => {
                sendMIDI_PC(currentPresetIdx);
                logEntry("sys", "Comando de activación enviado (CC32 + PC).");
            }, 100);
        }

        // ── MIDI ───────────────────────────────────────────────
        async function initMIDI() {
            if (!navigator.requestMIDIAccess) {
                setStatus("No MIDI Support", false);
                return;
            }
            try {
                const midiAccess = await navigator.requestMIDIAccess();
                midiAccess.onstatechange = () => findHelix(midiAccess);
                findHelix(midiAccess);
            } catch (err) { setStatus("MIDI Error", false); }
        }

        function findHelix(midiAccess) {
            const outputs = Array.from(midiAccess.outputs.values());
            const inputs = Array.from(midiAccess.inputs.values());
            midiOutput = outputs.find(o => o.name.toLowerCase().includes("helix")) || null;
            const newInput = inputs.find(i => i.name.toLowerCase().includes("helix")) || null;

            if (newInput && newInput !== midiInput) {
                midiInput = newInput;
                midiInput.onmidimessage = onMidiMessage;
            }
            if (midiOutput) {
                const isNewConnection = document.getElementById('status-badge').classList.contains('disconnected');
                setStatus(midiOutput.name, true);
                renderButtons();

                // Si es una conexión nueva, forzamos estado inicial para sincronizar
                if (isNewConnection) {
                    syncToDefault();
                }
            } else {
                setStatus("Helix Desconectada", false);
            }
        }

        function syncToDefault() {
            if (!midiOutput) return;
            logEntry("sys", "Sincronizando a estado inicial (USER 1 / 01A / Snap 1)...");

            sendMIDI(32, currentSetlist); // Cambiar a la setlist inicial (USER 1)

            setTimeout(() => {
                sendMIDI_PC(0);  // Preset 01A
                sendMIDI(69, 0); // Snapshot 1
            }, 100);
        }

        function sendPresetStep(step) {
            let next = currentPresetIdx + step;
            if (next < 0) next = 127;
            if (next > 127) next = 0;
            sendMIDI_PC(next);
        }

        function sendMIDI_PC(id) {
            if (!midiOutput) return;
            midiOutput.send([0xC0, id]);
            // Forzar actualización UI
            onMidiMessage({ data: [0xC0, id] });
            logEntry("tx", "[PC] Preset " + id);
        }

        function onMidiMessage(event) {
            const [status, data1, data2] = event.data;
            const type = status & 0xF0;
            if (type === 0xB0) handleCC(data1, data2);
            else if (type === 0xC0) {
                currentPresetIdx = data1;
                flash("card-preset");
                updatePresetDisplay(data1);
                logEntry("rx", "[PC] Preset → " + data1);
            }
        }

        function handleCC(cc, value) {
            if (cc === 0 || cc === 32) {
                if (currentSetlist !== value) {
                    currentSetlist = value;
                    updateSetlistDisplay(value);
                    logEntry("rx", "Setlist confirmada → " + (value + 1));
                }
            } else if (cc === 69) {
                currentSnapshot = value;
                highlightSnapshot(value);
                logEntry("rx", "Snapshot → " + (value + 1));
            }
        }

        function updateSetlistDisplay(id) {
            const sl = getSetlist(id);
            setText("setlist-name", sl.name.toUpperCase());
            setText("setlist-id", `#${id + 1}`);
        }

        function highlightSnapshot(val) {
            const buttons = document.querySelectorAll('.ctrl-btn');
            buttons.forEach((btn) => {
                if (parseInt(btn.dataset.val) === val) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function formatHelixPreset(id) {
            const num = parseInt(id);
            if (isNaN(num)) return "—";
            const bank = Math.floor(num / 4) + 1;
            const letter = ['A', 'B', 'C', 'D'][num % 4];
            return bank.toString().padStart(2, '0') + letter;
        }

        function updatePresetDisplay(id) {
            const preset = getPreset(currentSetlist, id);
            const name = preset.name || "Sin Nombre";
            const hasName = preset.name && preset.name !== "Sin Nombre";

            const nameEl = document.getElementById("preset-name");
            nameEl.textContent = name.toUpperCase();
            nameEl.style.color = hasName ? "var(--text)" : "var(--muted)";

            setText("preset-id", formatHelixPreset(id));
            renderButtons(); // Refrescar nombres de snapshots del preset
        }

        function sendMIDI(cc, value) {
            if (!midiOutput) return;
            midiOutput.send([0xB0, cc, value]);
            logEntry("tx", "[CC] " + cc + " = " + value);
        }

        // ── UI Helpers ────────────────────────────────────────
        function setStatus(msg, connected) {
            document.getElementById('status-text').textContent = msg;
            document.getElementById('status-badge').className = connected ? 'connected' : 'disconnected';
        }
        function setText(id, val) { document.getElementById(id).textContent = val; }
        function flash(id) {
            const el = document.getElementById(id);
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 800);
        }
        function renderButtons() {
            const container = document.getElementById('button-container');
            if (!container) return;
            container.innerHTML = '';

            const preset = getPreset(currentSetlist, currentPresetIdx);

            config.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'ctrl-btn';
                btn.dataset.val = item.value;

                const snapNumber = item.value + 1;
                const customName = preset.snapshots[snapNumber];
                const hasCustomName = !!customName;

                btn.innerHTML = `<span>${customName || item.name}</span>
                               <div class="edit-trigger" onclick="event.stopPropagation(); editSnapshotName(${snapNumber})">
                                 <i class="fa-solid fa-pen"></i>
                               </div>`;

                const displayColor = hasCustomName ? item.color : "var(--muted)";
                btn.style.backgroundColor = "transparent";
                btn.style.borderColor = hasCustomName ? (item.color + '44') : "var(--border)";
                btn.style.color = displayColor;
                btn.onclick = () => sendMIDI(item.cc, item.value);
                container.appendChild(btn);
            });
        }
        function logEntry(type, msg) {
            const log = document.getElementById('log');
            const div = document.createElement('div');
            div.className = 'log-entry ' + type;
            div.innerHTML = `<span class="ts">${new Date().toLocaleTimeString('es', { hour12: false })}</span>${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 50) log.removeChild(log.firstChild);
        }

        loadNames();
        initMIDI();
    </script>
</body>

</html>
