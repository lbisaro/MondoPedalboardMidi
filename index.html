<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#121212">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Helix Live Control</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #0d0f14;
            --surface: #161a23;
            --surface2: #1c222d;
            --accent: #f97316;
            --accent2: #00d4ff;
            --text: #f8fafc;
            --muted: #64748b;
            --border: #2d3646;
            --radius: 16px;
            --blue: #3b82f6;
        }

        body {
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Inter', sans-serif;
            color: var(--text);
        }

        header {
            padding: 15px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: -1px;
        }

        h1 span {
            color: var(--accent);
        }

        #status-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 700;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid var(--border);
        }

        #status-badge.connected {
            color: #4ade80;
            border-color: rgba(74, 222, 128, 0.3);
        }

        #status-badge.disconnected {
            color: #f87171;
            border-color: rgba(248, 113, 113, 0.3);
        }

        #main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Barra de Navegación */
        #bottom-nav {
            height: 75px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 0 5px;
            flex-shrink: 0;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            color: var(--muted);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 9px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            flex: 1;
            font-weight: 700;
        }

        .nav-item i {
            font-size: 18px;
        }

        .nav-item.active {
            color: var(--accent2);
        }

        /* Componentes Globales */
        .state-panel {
            width: 100%;
            max-width: 720px;
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .state-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            flex: 1;
            position: relative;
        }

        .state-card label {
            font-size: 9px;
            color: var(--muted);
            text-transform: uppercase;
            font-weight: 700;
        }

        .state-card .value {
            font-size: 16px;
            font-weight: 900;
            color: var(--text);
        }

        .state-card .sub {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            color: var(--muted);
        }

        .nav-col {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 60px;
        }

        .nav-btn {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .section-title {
            align-self: flex-start;
            width: 100%;
            max-width: 720px;
            margin: 15px 0 10px 0;
            font-size: 10px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-weight: 800;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 720px;
            margin-bottom: 20px;
        }

        .macro-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            width: 100%;
            max-width: 720px;
            margin-bottom: 20px;
        }

        .macro-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px;
            color: var(--accent2);
            cursor: pointer;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 50px;
            font-size: 11px;
            font-weight: 700;
            text-transform: uppercase;
            user-select: none;
        }

        /* Snapshots */
        .ctrl-btn {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 10px;
            color: var(--text);
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .ctrl-btn.active {
            background: var(--text);
            color: var(--bg);
            border-color: var(--text);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 25px;
            width: 90%;
            max-width: 400px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 10px;
            color: var(--muted);
            margin-bottom: 5px;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px;
            color: var(--text);
        }

        .modal-footer {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .btn-modal {
            padding: 10px 18px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 700;
        }

        .btn-save {
            background: var(--accent2);
            color: var(--bg);
        }

        .btn-cancel {
            background: transparent;
            color: var(--text);
            border: 1px solid var(--border);
        }

        .btn-danger {
            background: rgba(255, 68, 68, 0.1);
            color: #ff4444;
            margin-right: auto;
        }

        /* Gestores Listas */
        .manager-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            width: 100%;
        }

        .setlist-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            width: 100%;
            max-width: 720px;
        }

        .manager-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            gap: 8px;
            cursor: pointer;
            min-height: 80px;
            transition: all 0.2s;
        }

        .manager-item.customized {
            border-color: rgba(255, 255, 255, 0.4);
            color: #fff;
        }

        .manager-item.default {
            border-color: var(--border);
            color: var(--muted);
        }

        .manager-item.active {
            border-color: var(--accent2) !important;
            background: rgba(0, 212, 255, 0.05);
            color: var(--accent2) !important;
        }

        .manager-item .name {
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
        }

        .manager-item .id {
            font-family: 'JetBrains Mono', monospace;
            font-size: 10px;
            opacity: 0.5;
        }

        .preset-manager-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            width: 100%;
            max-width: 720px;
        }

        .preset-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .preset-item:hover {
            border-color: var(--accent2);
        }

        .preset-item .pid {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            font-weight: 900;
            color: var(--accent2);
            background: rgba(0, 212, 255, 0.1);
            padding: 4px 8px;
            border-radius: 6px;
            min-width: 45px;
            text-align: center;
        }

        .preset-item .name {
            flex: 1;
            font-weight: 700;
            font-size: 14px;
            color: var(--text);
            text-transform: uppercase;
        }

        .preset-actions {
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 36px;
            height: 36px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            color: #fff;
            background: var(--surface);
        }

        .action-btn.delete:hover {
            color: #ff4444;
            background: rgba(255, 68, 68, 0.1);
            border-color: rgba(255, 68, 68, 0.2);
        }

        #log {
            width: 100%;
            max-width: 720px;
            background: #000;
            border-radius: 12px;
            font-family: monospace;
            font-size: 11px;
            padding: 15px;
            color: #aaa;
            overflow-y: auto;
        }

        .log-entry.rx {
            color: var(--accent2);
        }

        .log-entry.tx {
            color: #4ade80;
        }
    </style>
</head>

<body>
    <header style="display: flex; justify-content: space-between; align-items: center; padding: 10px 15px;">
        <h1 style="margin: 0;">Helix <span>Live</span></h1>
        <div style="display: flex; align-items: center; gap: 12px;">
            <div id="status-badge" class="disconnected" style="margin: 0;">
                <span id="status-text">Buscando Helix...</span>
            </div>
            <i class="fa-solid fa-expand" id="btn-fullscreen" onclick="toggleFullscreen()" style="cursor: pointer; opacity: 0.6; font-size: 1.2rem; color: var(--accent2);"></i>
        </div>
    </header>

    <main id="main-content">
        <!-- El JS inyecta el contenido aquí -->
    </main>

    <nav id="bottom-nav">
        <div class="nav-item active" onclick="switchView('home')">
            <i class="fa-solid fa-house"></i>
            <span>Home</span>
        </div>
        <div class="nav-item" onclick="switchView('setlists')">
            <i class="fa-solid fa-list-ul"></i>
            <span>Setlists</span>
        </div>
        <div class="nav-item" onclick="switchView('presets')">
            <i class="fa-solid fa-folder-open"></i>
            <span>Presets</span>
        </div>
        <div class="nav-item" onclick="switchView('snapshots')">
            <i class="fa-solid fa-grip"></i>
            <span>Snaps</span>
        </div>
        <div class="nav-item" onclick="switchView('macros')">
            <i class="fa-solid fa-bolt"></i>
            <span>Macros</span>
        </div>
        <div class="nav-item" onclick="switchView('console')">
            <i class="fa-solid fa-terminal"></i>
            <span>Log</span>
        </div>
    </nav>

    <!-- Modales -->
    <div id="setlist-edit-modal" class="modal-overlay">
        <div class="modal-content">
            <h3>Editar Setlist</h3>
            <input type="hidden" id="edit-setlist-id">
            <div class="form-group">
                <input type="text" id="setlist-edit-name">
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" onclick="closeModal('setlist-edit-modal')">Cancelar</button>
                <button class="btn-modal btn-save" onclick="saveSetlistName()">Guardar</button>
            </div>
        </div>
    </div>

    <div id="macro-modal" class="modal-overlay">
        <div class="modal-content">
            <h3 id="modal-title">Nueva Macro</h3>
            <input type="hidden" id="edit-index">
            <div class="form-group">
                <label>Nombre</label>
                <input type="text" id="macro-name">
            </div>
            <div class="form-group">
                <label>Comandos CC:VALOR</label>
                <textarea id="macro-cmds"></textarea>
            </div>
            <div class="modal-footer">
                <button id="btn-delete-macro" class="btn-modal btn-danger"
                    onclick="deleteMacroFromModal()">Borrar</button>
                <button class="btn-modal btn-cancel" onclick="closeModal('macro-modal')">Cancelar</button>
                <button class="btn-modal btn-save" onclick="saveMacro()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal para editar Snapshot -->
    <div id="snapshot-edit-modal" class="modal-overlay">
        <div class="modal-content">
            <p class="section-title" id="snapshot-modal-title">Editar Snapshot</p>
            <input type="hidden" id="edit-snapshot-id">
            <div class="form-group">
                <label>Nombre del Snapshot</label>
                <input type="text" id="snapshot-edit-name" placeholder="Ej: SOLO BOOST">
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" onclick="closeModal('snapshot-edit-modal')">Cancelar</button>
                <button class="btn-modal btn-save" onclick="saveSnapshotName()">Guardar</button>
            </div>
        </div>
    </div>

    <!-- Modal para editar Preset -->
    <div id="preset-edit-modal" class="modal-overlay">
        <div class="modal-content">
            <p class="section-title" id="preset-modal-title">Editar Nombre de Preset</p>
            <input type="hidden" id="edit-preset-id">
            <div class="form-group">
                <label>Nombre del Preset</label>
                <input type="text" id="preset-edit-name" placeholder="Ej: MY DELUXE CLEAN">
            </div>
            <div class="modal-footer">
                <button class="btn-modal btn-cancel" onclick="closeModal('preset-edit-modal')">Cancelar</button>
                <button class="btn-modal btn-save" onclick="savePresetName()">Guardar</button>
            </div>
        </div>
    </div>

    <script>
        let midiOutput = null;
        let midiInput = null;

        const DEFAULT_SETLIST_NAMES = [
            "FACTORY 1", "FACTORY 2", "USER 1", "USER 2",
            "USER 3", "USER 4", "USER 5", "TEMPLATES"
        ];

        // Diccionarios y Config Global Jerárquica
        let cloudConfig = {
            setlists: {}, // Solo guardamos las modificadas
            customActions: []
        };

        let vpsUrl = "https://helix.bisaro.ar/helix_api.php?v=1";

        let currentSetlist = 2; // Iniciar en USER 1 (index 2)
        let currentPresetIdx = 0;
        let currentSnapshot = -1; // -1 significa desconocido hasta confirmación MIDI

        const config = [
            // Fila superior: 5-8
            { name: "SNAP 5", cc: 69, value: 4, color: "#ffffff" },
            { name: "SNAP 6", cc: 69, value: 5, color: "#ffffff" },
            { name: "SNAP 7", cc: 69, value: 6, color: "#ffffff" },
            { name: "SNAP 8", cc: 69, value: 7, color: "#ffffff" },
            // Fila inferior: 1-4
            { name: "SNAP 1", cc: 69, value: 0, color: "#ffffff" },
            { name: "SNAP 2", cc: 69, value: 1, color: "#ffffff" },
            { name: "SNAP 3", cc: 69, value: 2, color: "#ffffff" },
            { name: "SNAP 4", cc: 69, value: 3, color: "#ffffff" },
        ];

        // Helpers para navegación jerárquica
        function getSetlist(sid) {
            if (!cloudConfig.setlists) cloudConfig.setlists = {};
            if (!cloudConfig.setlists[sid]) {
                return { name: DEFAULT_SETLIST_NAMES[sid], presets: {} };
            }
            return cloudConfig.setlists[sid];
        }

        function getPreset(sid, pid) {
            const sl = getSetlist(sid);
            if (!sl.presets) sl.presets = {};
            if (!sl.presets[pid] || typeof sl.presets[pid] !== 'object') {
                sl.presets[pid] = { name: "_NO_NAME_", snapshots: {} };
            }
            return sl.presets[pid];
        }

        // ── Cloud Persistence ────────────────────────────────
        async function loadNames() {
            const savedData = localStorage.getItem('helix_cloud_config');
            if (savedData) {
                try {
                    const parsed = JSON.parse(savedData);
                    // Validación de migración: comprobamos si el primer elemento es un objeto (nuevo formato)
                    if (parsed.setlists && typeof parsed.setlists[0] === 'object') {
                        cloudConfig = parsed;
                    } else {
                        logEntry("sys", "Detectado formato antiguo. Reseteando estructura...");
                    }
                } catch (e) {
                    console.error("Error al parsear config local", e);
                }
            }

            // Sincronizar automáticamente con la nube al inicio
            logEntry("sys", "Sincronizando con la nube...");
            await syncWithCloud(true);
        }

        async function syncWithCloud(isSilent = false) {
            if (!vpsUrl) return;

            try {
                const response = await fetch(vpsUrl);
                const data = await response.json();

                if (data.setlists) cloudConfig.setlists = data.setlists;

                // Si la nube tiene macros, las usamos. Si no, y nosotros tenemos, las subimos.
                if (data.customActions && data.customActions.length > 0) {
                    cloudConfig.customActions = data.customActions;
                } else if (cloudConfig.customActions.length > 0) {
                    logEntry("sys", "Sincronizando macros locales a la nube...");
                    await saveCloudData();
                }

                localStorage.setItem('helix_cloud_config', JSON.stringify(cloudConfig));
                localStorage.setItem('helix_vps_url', vpsUrl);

                renderButtons();
                renderCustomActions();
                updatePresetDisplay(currentPresetIdx);
                updateSetlistDisplay(currentSetlist);
                if (!isSilent) alert("Nube sincronizada con éxito.");
                logEntry("sys", "Sincronización Cloud exitosa.");
            } catch (e) {
                console.error(e);
                if (!isSilent) alert("Error al conectar con el VPS.");
            }
        }

        async function saveCloudData() {
            const filteredSetlists = {};

            for (const sid in cloudConfig.setlists) {
                const sl = cloudConfig.setlists[sid];

                // 1. Filtrar presets: Solo los que tengan un nombre real válido
                const filteredPresets = {};
                if (sl.presets) {
                    for (const pid in sl.presets) {
                        const preset = sl.presets[pid];
                        const nameValid = preset.name && preset.name !== "" && preset.name !== "_NO_NAME_";

                        if (nameValid) {
                            filteredPresets[pid] = preset;
                        }
                    }
                }

                // 2. Filtrar setlists: Solo si tienen al menos un preset válido
                const hasValidPresets = Object.keys(filteredPresets).length > 0;

                if (hasValidPresets) {
                    filteredSetlists[sid] = {
                        ...sl,
                        presets: filteredPresets
                    };
                }
            }

            const dataToSave = {
                ...cloudConfig,
                setlists: filteredSetlists
            };

            localStorage.setItem('helix_cloud_config', JSON.stringify(dataToSave));

            try {
                await fetch(vpsUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(dataToSave)
                });
                logEntry("sys", "Nube sincronizada (Limpieza Estricta).");
            } catch (e) {
                logEntry("sys", "Error al sincronizar con la nube.");
            }
        }

        async function editPresetName() {
            editPresetNameAt(currentPresetIdx);
        }

        function editPresetNameAt(pid) {
            const preset = getPreset(currentSetlist, pid);
            document.getElementById('edit-preset-id').value = pid;
            document.getElementById('preset-edit-name').value = (preset.name === "_NO_NAME_") ? "" : preset.name;
            document.getElementById('preset-modal-title').textContent = `Editar Preset ${formatHelixPreset(pid)}`;
            document.getElementById('preset-edit-modal').style.display = 'flex';
        }

        async function savePresetName() {
            const pid = parseInt(document.getElementById('edit-preset-id').value);
            const newName = document.getElementById('preset-edit-name').value.trim();
            const sl = getSetlist(currentSetlist);

            if (newName) {
                sl.presets[pid].name = newName;
            } else {
                sl.presets[pid].name = "_NO_NAME_";
            }

            renderPresetView();
            if (pid === currentPresetIdx) updatePresetDisplay(pid);
            await saveCloudData();
            closeModal('preset-edit-modal');
        }

        function editSnapshotName(snapId) {
            const preset = getPreset(currentSetlist, currentPresetIdx);
            const currentName = preset.snapshots[snapId] || `SNAP ${snapId}`;

            document.getElementById('edit-snapshot-id').value = snapId;
            document.getElementById('snapshot-edit-name').value = (currentName.startsWith("SNAP ")) ? "" : currentName;
            document.getElementById('snapshot-modal-title').textContent = `Editar Snapshot ${snapId}`;
            document.getElementById('snapshot-edit-modal').style.display = 'flex';
        }

        async function saveSnapshotName() {
            const snapId = document.getElementById('edit-snapshot-id').value;
            const newName = document.getElementById('snapshot-edit-name').value.trim();
            const preset = getPreset(currentSetlist, currentPresetIdx);

            if (newName) {
                preset.snapshots[snapId] = newName;
            } else {
                delete preset.snapshots[snapId];
            }

            renderButtons();
            await saveCloudData();
            closeModal('snapshot-edit-modal');
        }

        function editSetlistName() {
            editSetlistNameInManager(currentSetlist);
        }

        function sendSetlistStep(step) {
            let next = currentSetlist + step;
            if (next < 0) next = 7;
            if (next > 7) next = 0;
            changeSetlist(next);
        }

        async function changeSetlist(id) {
            const setlistId = parseInt(id);
            logEntry("sys", "Intentando cambio a Setlist " + (setlistId + 1) + "...");

            // Actualizamos estado local
            currentSetlist = setlistId;
            updateSetlistDisplay(setlistId);

            // Según HelixHelp, el comando correcto es CC 32
            sendMIDI(32, setlistId);

            // Un pequeño retraso para que la Helix procese el cambio de banco antes del PC
            setTimeout(() => {
                sendMIDI_PC(currentPresetIdx);
                logEntry("sys", "Comando de activación enviado (CC32 + PC).");
            }, 100);
        }

        // ── MIDI ───────────────────────────────────────────────
        async function initMIDI() {
            if (!navigator.requestMIDIAccess) {
                setStatus("No MIDI Support", false);
                return;
            }
            try {
                const midiAccess = await navigator.requestMIDIAccess();
                midiAccess.onstatechange = () => findHelix(midiAccess);
                findHelix(midiAccess);
            } catch (err) { setStatus("MIDI Error", false); }
        }

        function findHelix(midiAccess) {
            const outputs = Array.from(midiAccess.outputs.values());
            const inputs = Array.from(midiAccess.inputs.values());
            midiOutput = outputs.find(o => o.name.toLowerCase().includes("helix")) || null;
            const newInput = inputs.find(i => i.name.toLowerCase().includes("helix")) || null;

            if (newInput && newInput !== midiInput) {
                midiInput = newInput;
                midiInput.onmidimessage = onMidiMessage;
            }
            if (midiOutput) {
                const isNewConnection = document.getElementById('status-badge').classList.contains('disconnected');
                setStatus(midiOutput.name, true);
                renderButtons();

                // Si es una conexión nueva, forzamos estado inicial para sincronizar
                if (isNewConnection) {
                    syncToDefault();
                }
            } else {
                setStatus("Helix Desconectada", false);
            }
        }

        function syncToDefault() {
            if (!midiOutput) return;
            logEntry("sys", "Sincronizando a estado inicial (USER 1 / 01A / Snap 1)...");

            sendMIDI(32, currentSetlist); // Cambiar a la setlist inicial (USER 1)

            setTimeout(() => {
                sendMIDI_PC(0);  // Preset 01A
                sendMIDI(69, 0); // Snapshot 1
            }, 100);
        }

        function sendPresetStep(step) {
            let next = currentPresetIdx + step;
            if (next < 0) next = 127;
            if (next > 127) next = 0;
            sendMIDI_PC(next);
        }

        function sendMIDI_PC(id) {
            if (!midiOutput) return;
            midiOutput.send([0xC0, id]);
            // Forzar actualización UI
            onMidiMessage({ data: [0xC0, id] });
            logEntry("tx", "[PC] Preset " + id);
        }

        function onMidiMessage(event) {
            const [status, data1, data2] = event.data;
            const type = status & 0xF0;
            if (type === 0xB0) handleCC(data1, data2);
            else if (type === 0xC0) {
                currentPresetIdx = data1;
                currentSnapshot = -1; // Reset hasta que la Helix confirme el nuevo snapshot
                flash("card-preset");
                updatePresetDisplay(data1);
                logEntry("rx", "[PC] Preset → " + data1);
            }
        }

        function handleCC(cc, value) {
            if (cc === 0 || cc === 32) {
                if (currentSetlist !== value) {
                    currentSetlist = value;
                    updateSetlistDisplay(value);
                    logEntry("rx", "Setlist confirmada → " + (value + 1));
                }
            } else if (cc === 69) {
                currentSnapshot = value;
                highlightSnapshot(value);
                logEntry("rx", "Snapshot → " + (value + 1));
            } else if (cc === 68) {
                tunerActive = (value >= 64);
                const el = document.getElementById('tuner-text');
                if (el) {
                    el.style.color = tunerActive ? "#fff" : "#facc15";
                    el.style.textShadow = tunerActive ? "0 0 10px #fff" : "none";
                }
                logEntry("rx", "Tuner → " + (tunerActive ? "ON" : "OFF"));
            }
        }

        function updateSetlistDisplay(id) {
            const nameEl = document.getElementById("setlist-name");
            if (!nameEl) return;
            const sl = getSetlist(id);
            nameEl.textContent = sl.name.toUpperCase();
            setText("setlist-id", `#${id + 1}`);
        }

        function highlightSnapshot(val) {
            currentSnapshot = val;
            renderButtons();
        }

        function formatHelixPreset(id) {
            const num = parseInt(id);
            if (isNaN(num)) return "—";
            const bank = Math.floor(num / 4) + 1;
            const letter = ['A', 'B', 'C', 'D'][num % 4];
            return bank.toString().padStart(2, '0') + letter;
        }

        function updatePresetDisplay(id) {
            const nameEl = document.getElementById("preset-name");
            if (!nameEl) return;

            const preset = getPreset(currentSetlist, id);
            const name = preset.name || "_NO_NAME_";
            const hasName = preset.name && preset.name !== "_NO_NAME_";

            nameEl.textContent = name.toUpperCase();
            nameEl.style.color = hasName ? "var(--text)" : "var(--muted)";

            setText("preset-id", formatHelixPreset(id));
            renderButtons(); // Refrescar nombres de snapshots del preset
        }

        function sendMIDI(cc, value) {
            if (!midiOutput) return;
            midiOutput.send([0xB0, cc, value]);
            logEntry("tx", "[CC] " + cc + " = " + value);
        }

        // ── UI Helpers ────────────────────────────────────────
        function setStatus(msg, connected) {
            const txt = document.getElementById('status-text');
            const badge = document.getElementById('status-badge');
            if (txt) txt.textContent = msg;
            if (badge) badge.className = connected ? 'connected' : 'disconnected';
        }
        function setText(id, val) {
            const el = document.getElementById(id);
            if (el) el.textContent = val;
        }
        function flash(id) {
            const el = document.getElementById(id);
            if (!el) return;
            el.classList.add('flash');
            setTimeout(() => el.classList.remove('flash'), 800);
        }
        function renderButtons() {
            const container = document.getElementById('button-container');
            if (!container) return;
            container.innerHTML = '';

            const preset = getPreset(currentSetlist, currentPresetIdx);

            config.forEach(item => {
                const btn = document.createElement('button');
                btn.className = 'ctrl-btn';
                btn.dataset.val = item.value;

                const snapNumber = item.value + 1;
                const customName = preset.snapshots[snapNumber];
                const hasCustomName = !!customName;

                // Gestos para editar: doble clic o toque largo
                let pressTimer;
                let isLongPress = false;

                const startPress = () => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        editSnapshotName(snapNumber);
                    }, 700);
                };

                const endPress = () => clearTimeout(pressTimer);

                btn.onclick = () => {
                    if (isLongPress) return;

                    if (currentView === 'snapshots') {
                        // En la vista dedicada, el clic edita
                        editSnapshotName(snapNumber);
                    } else {
                        // En Home, el clic activa
                        sendMIDI(item.cc, item.value);
                    }
                };

                btn.ondblclick = (e) => {
                    e.stopPropagation();
                    editSnapshotName(snapNumber);
                };

                btn.onmousedown = startPress;
                btn.onmouseup = endPress;
                btn.ontouchstart = startPress;
                btn.ontouchend = endPress;

                btn.innerHTML = `<span>${customName || item.name}</span>`;

                if (currentSnapshot === item.value) {
                    btn.classList.add('active');
                } else {
                    const displayColor = hasCustomName ? item.color : "var(--muted)";
                    btn.style.backgroundColor = "transparent";
                    btn.style.borderColor = hasCustomName ? (item.color + '44') : "var(--border)";
                    btn.style.color = displayColor;
                }

                container.appendChild(btn);
            });
        }
        function logEntry(type, msg) {
            const log = document.getElementById('log');
            if (!log) return;
            const div = document.createElement('div');
            div.className = 'log-entry ' + type;
            div.innerHTML = `<span class="ts">${new Date().toLocaleTimeString('es', { hour12: false })}</span>${msg}`;
            log.appendChild(div);
            log.scrollTop = log.scrollHeight;
            if (log.children.length > 50) log.removeChild(log.firstChild);
        }

        function renderCustomActions() {
            const container = document.getElementById('macro-container');
            if (!container) return;
            container.innerHTML = '';

            cloudConfig.customActions.forEach((action, index) => {
                const btn = document.createElement('div');
                btn.className = 'macro-btn';

                let pressTimer;
                let isLongPress = false;

                const startPress = () => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        openMacroModal(index);
                    }, 700); // 700ms para toque largo
                };

                const endPress = () => {
                    clearTimeout(pressTimer);
                };

                // Ejecución normal al hacer clic simple
                btn.onclick = () => {
                    if (!isLongPress) executeCustomAction(action);
                };

                // Edición al hacer doble clic
                btn.ondblclick = (e) => {
                    e.stopPropagation();
                    openMacroModal(index);
                };

                // Soporte para toque largo (escritorio y móvil)
                btn.onmousedown = startPress;
                btn.onmouseup = endPress;
                btn.ontouchstart = startPress;
                btn.ontouchend = endPress;

                btn.innerHTML = `<span class="name">${action.name}</span>`;
                container.appendChild(btn);
            });
        }

        function openMacroModal(index = -1) {
            const modal = document.getElementById('macro-modal');
            const title = document.getElementById('modal-title');
            const nameInp = document.getElementById('macro-name');
            const cmdsInp = document.getElementById('macro-cmds');
            const indexInp = document.getElementById('edit-index');
            const delBtn = document.getElementById('btn-delete-macro');

            indexInp.value = index;
            if (index === -1) {
                title.textContent = "Nueva Macro";
                nameInp.value = "";
                cmdsInp.value = "";
                delBtn.style.display = 'none';
            } else {
                const action = cloudConfig.customActions[index];
                title.textContent = "Editar Macro";
                nameInp.value = action.name;
                cmdsInp.value = action.msgs.map(m => `${m.cc}:${m.val}`).join(', ');
                delBtn.style.display = 'block';
            }
            modal.style.display = 'flex';
        }

        function closeModal(id) {
            document.getElementById(id).style.display = 'none';
        }

        function openSetlistManager() {
            renderSetlistManagerList();
            document.getElementById('setlist-manager-modal').style.display = 'flex';
        }

        function renderSetlistManagerList() {
            const container = document.getElementById('setlist-manager-list');
            if (!container) return;
            container.innerHTML = '';

            for (let i = 0; i < 8; i++) {
                const sl = getSetlist(i);
                const isDefaultName = sl.name === DEFAULT_SETLIST_NAMES[i];
                const hasPresets = sl.presets && Object.keys(sl.presets).length > 0;
                const isCustomized = hasPresets;

                const item = document.createElement('div');
                item.className = `manager-item ${currentSetlist === i ? 'active' : ''} ${isCustomized ? 'customized' : 'default'}`;

                // Gestos para editar: doble clic o toque largo
                let pressTimer;
                let isLongPress = false;

                const startPress = () => {
                    isLongPress = false;
                    pressTimer = setTimeout(() => {
                        isLongPress = true;
                        editSetlistNameInManager(i);
                    }, 700);
                };
                const endPress = () => clearTimeout(pressTimer);

                item.onclick = () => {
                    if (!isLongPress) {
                        changeSetlist(i);
                        switchView('home');
                    }
                };
                item.ondblclick = (e) => {
                    e.stopPropagation();
                    editSetlistNameInManager(i);
                };

                item.onmousedown = startPress;
                item.onmouseup = endPress;
                item.ontouchstart = startPress;
                item.ontouchend = endPress;

                item.innerHTML = `
                    <span class="name">${sl.name}</span>
                `;
                container.appendChild(item);
            }
        }

        function editSetlistNameInManager(id) {
            const sl = getSetlist(id);
            document.getElementById('edit-setlist-id').value = id;
            document.getElementById('setlist-edit-name').value = sl.name;
            document.getElementById('setlist-edit-modal').style.display = 'flex';
        }

        async function saveSetlistName() {
            const id = parseInt(document.getElementById('edit-setlist-id').value);
            const newName = document.getElementById('setlist-edit-name').value.trim();

            if (newName) {
                if (!cloudConfig.setlists[id]) {
                    cloudConfig.setlists[id] = { name: DEFAULT_SETLIST_NAMES[id], presets: {} };
                }
                cloudConfig.setlists[id].name = newName;
                renderSetlistManagerList();
                if (id === currentSetlist) updateSetlistDisplay(id);
                await saveCloudData();
                closeModal('setlist-edit-modal');
            }
        }

        // Configurar gestos para la tarjeta de Setlist
        function initSetlistGestures() {
            const card = document.getElementById('card-setlist');
            if (!card) return;
            let pressTimer;
            let isLong = false;

            const start = () => {
                isLong = false;
                pressTimer = setTimeout(() => {
                    isLong = true;
                    openSetlistManager();
                }, 700);
            };
            const end = () => {
                clearTimeout(pressTimer);
                if (!isLong) openSetlistManager();
            };

            card.onmousedown = start;
            card.onmouseup = end;
            card.ontouchstart = start;
            card.ontouchend = end;
        }

        function initPresetGestures() {
            const card = document.getElementById('card-preset');
            if (!card) return;
            card.onclick = () => switchView('presets');
        }

        async function saveMacro() {
            const name = document.getElementById('macro-name').value.trim();
            const cmdsStr = document.getElementById('macro-cmds').value.trim();
            const index = parseInt(document.getElementById('edit-index').value);

            if (!name || !cmdsStr) {
                alert("Por favor completa todos los campos");
                return;
            }

            try {
                const msgs = cmdsStr.split(',').map(s => {
                    const parts = s.split(':');
                    return { cc: parseInt(parts[0].trim()), val: parseInt(parts[1].trim()) };
                });

                if (index === -1) {
                    cloudConfig.customActions.push({ name, msgs });
                } else {
                    cloudConfig.customActions[index] = { name, msgs };
                }

                renderCustomActions();
                await saveCloudData();
                closeModal('macro-modal');
            } catch (e) {
                alert("Formato de comandos incorrecto. Usa CC:VALOR, CC:VALOR");
            }
        }

        async function deleteMacroFromModal() {
            const index = parseInt(document.getElementById('edit-index').value);
            if (index !== -1 && confirm("¿Estás seguro de que deseas eliminar esta macro?")) {
                cloudConfig.customActions.splice(index, 1);
                renderCustomActions();
                await saveCloudData();
                closeModal('macro-modal');
            }
        }

        async function executeCustomAction(action) {
            logEntry("sys", "Ejecutando Macro: " + action.name);
            for (const msg of action.msgs) {
                sendMIDI(msg.cc, msg.val);
                // Pequeño delay entre mensajes para no saturar
                await new Promise(r => setTimeout(r, 20));
            }
        }

        // Gestión de Vistas
        let currentView = 'home';

        function switchView(viewName) {
            currentView = viewName;
            const content = document.getElementById('main-content');

            // Actualizar estado botones nav
            document.querySelectorAll('.nav-item').forEach(item => {
                item.classList.remove('active');
                if (item.getAttribute('onclick').includes(viewName)) {
                    item.classList.add('active');
                }
            });

            switch (viewName) {
                case 'home': renderHomeView(); break;
                case 'setlists': renderSetlistView(); break;
                case 'presets': renderPresetView(); break;
                case 'snapshots': renderSnapshotsView(); break;
                case 'macros': renderMacrosView(); break;
                case 'console': renderConsoleView(); break;
            }
        }

        function renderHomeView() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div class="state-panel">
                    <div class="state-card" id="card-setlist" style="flex: 1; user-select: none;">
                        <label>Setlist</label>
                        <div>
                            <span class="sub" id="setlist-id">...</span>
                            <span class="value" id="setlist-name" style="font-size: 14px; color: var(--accent2);">...</span>
                        </div>
                    </div>
                    <div class="state-card" id="card-preset" style="flex: 2; user-select: none;">
                        <label>Preset Activo</label>
                        <div>
                            <span class="sub" id="preset-id">...</span>
                            <span class="value" id="preset-name">...</span>
                        </div>
                    </div>
                    <div class="state-card" id="card-tuner" style="flex: 1; cursor: pointer;" onclick="toggleTuner()">
                        <div class="value" id="tuner-text" style="color: #facc15;">TUNER</div>
                    </div>
                </div>

                <div class="grid" id="button-container"></div>

                <div class="macro-grid" id="macro-container"></div>
            `;

            initSetlistGestures();
            initPresetGestures();
            renderButtons();
            renderCustomActions();
            updateSetlistDisplay(currentSetlist);
            updatePresetDisplay(currentPresetIdx);
        }

        function renderSetlistView() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <p class="section-title">Selector de Setlists</p>
                <div class="setlist-grid" id="setlist-manager-list"></div>
            `;
            renderSetlistManagerList();
        }

        function renderPresetView() {
            const content = document.getElementById('main-content');
            const sl = getSetlist(currentSetlist);
            const presets = sl.presets || {};
            const pids = Object.keys(presets).sort((a, b) => parseInt(a) - parseInt(b));

            content.innerHTML = `
                <div style="width:100%; max-width:720px;">
                    <p class="section-title">Presets de ${sl.name}</p>
                </div>
                <div class="preset-manager-list" id="preset-list-container">
                    ${pids.length === 0 ? '<p style="color:var(--muted); text-align:center; padding:20px;">No hay presets guardados en este setlist.</p>' : ''}
                </div>
            `;

            const container = document.getElementById('preset-list-container');
            pids.forEach(pid => {
                const preset = presets[pid];
                const item = document.createElement('div');
                item.className = 'preset-item';
                item.onclick = () => {
                    sendMIDI_PC(parseInt(pid));
                    switchView('home');
                };

                item.innerHTML = `
                    <div class="pid">${formatHelixPreset(pid)}</div>
                    <div class="name">${preset.name}</div>
                    <div class="preset-actions">
                        <div class="action-btn" onclick="event.stopPropagation(); editPresetNameAt(${pid})">
                            <i class="fa-solid fa-pen"></i>
                        </div>
                        <div class="action-btn delete" onclick="event.stopPropagation(); deletePresetFromManager(${pid})">
                            <i class="fa-solid fa-trash"></i>
                        </div>
                    </div>
                `;
                container.appendChild(item);
            });
        }

        function editPresetNameAt(pid) {
            const preset = getPreset(currentSetlist, pid);
            document.getElementById('edit-preset-id').value = pid;
            document.getElementById('preset-edit-name').value = (preset.name === "_NO_NAME_") ? "" : preset.name;
            document.getElementById('preset-modal-title').textContent = `Editar Preset ${formatHelixPreset(pid)}`;
            document.getElementById('preset-edit-modal').style.display = 'flex';
        }

        async function deletePresetFromManager(pid) {
            if (confirm(`¿Estás seguro de eliminar el nombre del Preset ${formatHelixPreset(pid)}?`)) {
                const sl = getSetlist(currentSetlist);
                delete sl.presets[pid];
                renderPresetView();
                if (parseInt(pid) === currentPresetIdx) updatePresetDisplay(currentPresetIdx);
                await saveCloudData();
            }
        }

        function renderSnapshotsView() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <p class="section-title">Snapshots Detallados</p>
                <div class="grid" id="button-container" style="margin-top: 20px;"></div>
            `;
            renderButtons();
        }

        function renderMacrosView() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <div style="width:100%; max-width:720px; display:flex; justify-content:space-between; align-items:center;">
                    <p class="section-title">Macros & Acciones</p>
                    <button class="add-macro-btn" onclick="openMacroModal()" title="Añadir Macro">
                        <i class="fa-solid fa-plus"></i>
                    </button>
                </div>
                <div class="macro-grid" id="macro-container"></div>
            `;
            renderCustomActions();
        }

        function renderConsoleView() {
            const content = document.getElementById('main-content');
            content.innerHTML = `
                <p class="section-title">Consola MIDI</p>
                <div id="log" style="height: 100%;"></div>
            `;
            // El log se autolimpa, solo necesitamos asegurar que exista
        }



        let tunerActive = false;
        function toggleTuner() {
            tunerActive = !tunerActive;
            sendMIDI(68, tunerActive ? 127 : 0);
            const el = document.getElementById('tuner-text');
            if (el) {
                el.style.color = tunerActive ? "#fff" : "#facc15";
                el.style.textShadow = tunerActive ? "0 0 10px #fff" : "none";
            }
            logEntry("tx", "[CC 68] Tuner " + (tunerActive ? "ON" : "OFF"));
        }

        // Modificar apertura de gestor de setlists
        function openSetlistManager() {
            switchView('setlists');
        }

        switchView('home');
        loadNames();
        initMIDI();




        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error al intentar modo pantalla completa: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js')
                .then(() => console.log("Service Worker Registrado"));
        }
    </script>
</body>

</html>
